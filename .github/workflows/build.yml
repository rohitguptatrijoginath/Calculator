name: Build Kivy APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          python3-dev python3-pip build-essential libsqlite3-dev sqlite3 \
          bzip2 libbz2-dev liblzma-dev libreadline-dev uuid-dev libgdbm-dev \
          tk-dev libdb5.3-dev libexpat1-dev libmpdec-dev openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      # === सबसे महत्वपूर्ण स्टेप: License Acceptance (Non-interactive) ===
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          
          # Buildozer के SDK path पर लाइसेंस स्वीकार करें
          SDK_PATH="$HOME/.buildozer/android/platform/android-sdk"
          
          if [ -d "$SDK_PATH/cmdline-tools/latest/bin" ]; then
            yes | $SDK_PATH/cmdline-tools/latest/bin/sdkmanager --licenses || true
          fi
          
          if [ -d "$SDK_PATH/tools/bin" ]; then
            yes | $SDK_PATH/tools/bin/sdkmanager --licenses || true
          fi

      - name: Build APK
        run: buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
